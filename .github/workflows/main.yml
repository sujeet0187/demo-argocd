name: argocd-eks ## $Project Name / $Branch

on:
  push:
    branches:
      - main ## CHANGE Branch Name HERE !!!

permissions:
  id-token: write  ## NEEDED!!!
  contents: write  ## CHANGED from 'read' to 'write' so we can push manifest updates

jobs:
  credentials_build_deploy:
    name: Building and Pushing the Image
    runs-on: [ubuntu-latest] ## private/public runner

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4 ## Upgraded to v4
      with:
        role-to-assume: arn:aws:iam::611434859417:role/GitHubActionRole-EKS  # change AWS account HERE
        aws-region: us-east-1
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2      

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY:  ${{ steps.login-ecr.outputs.registry }}         
        ECR_REPOSITORY: agrocd  ## CHANGE ECR Name HERE!!!
      run: |
        IMAGE_TAG=$(git rev-parse --short "$GITHUB_SHA")
        ENV=main                                    ## CHANGE Env Name HERE!!!
        BRANCH=${GITHUB_REF##*/}
        FULL_IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$BRANCH-$IMAGE_TAG"
        
        # Build and push the image
        docker build -f Dockerfile-$ENV --build-arg ARG_ENV=${ENV} -t $FULL_IMAGE_URI .
        docker push $FULL_IMAGE_URI
        
        # Update the deployment manifest locally in the runner
        cd manifest/main                            ## CHANGE DIR Name HERE!!!
        sed -i "s|CHANGE-IMAGE-NAME|$FULL_IMAGE_URI|g" deployment.yaml

    # NEW STEP: Commit and push the updated deployment file back to GitHub
    - name: Commit and Push Manifest Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the changed file
        git add manifest/main/deployment.yaml
        
        # Commit with [skip ci] to prevent infinite workflow loops
        git commit -m "image deployment update: auto-updated by github actions [skip ci]"
        
        # Push changes back to the active branch
        git push origin main